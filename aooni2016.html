<!DOCTYPE html>
  <html>
      <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="user-scalable=no">
          <link rel="icon" href="https://cdn.jsdelivr.net/gh/kuru-bana/Games@main/aooni2016/icon/icon.png" type="image/png">
          <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/kuru-bana/Games@main/aooni2016/icon/icon.png">
          <title>青鬼2016</title>
          <meta name="description" content="館に閉じ込められた中学生達が化物から逃げつつ脱出を試みる">
          <style>
              body { background-color: black; margin: 0; }
              @font-face {
                  font-family: GameFontAooni;
                  src: url("https://cdn.jsdelivr.net/gh/kuru-bana/Games@main/aooni2016/fonts/mplus-1m-regular.ttf");
              }
          </style>
          <script>
          (function() {
              var CDN_BASE = 'https://cdn.jsdelivr.net/gh/kuru-bana/Games@main/aooni2016/';
              var RELATIVE = /^(?!https?:\/\/|data:|blob:|javascript:|\/)/;

              // Patch XMLHttpRequest to redirect relative paths to CDN
              var origOpen = XMLHttpRequest.prototype.open;
              XMLHttpRequest.prototype.open = function(method, url) {
                  if (typeof url === 'string' && RELATIVE.test(url)) {
                      url = CDN_BASE + url;
                  }
                  return origOpen.apply(this, arguments.length === 2
                      ? [method, url]
                      : Array.prototype.slice.call(arguments, 0).map(function(a, i) { return i === 1 ? url : a; })
                  );
              };

              // Patch Image src setter to redirect to CDN
              var origDesc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
              if (origDesc && origDesc.set) {
                  Object.defineProperty(HTMLImageElement.prototype, 'src', {
                      set: function(value) {
                          if (typeof value === 'string' && RELATIVE.test(value)) {
                              value = CDN_BASE + value;
                          }
                          origDesc.set.call(this, value);
                      },
                      get: origDesc.get,
                      configurable: true,
                      enumerable: origDesc.enumerable
                  });
              }

              // Patch fetch if used
              if (window.fetch) {
                  var origFetch = window.fetch.bind(window);
                  window.fetch = function(url, opts) {
                      if (typeof url === 'string' && RELATIVE.test(url)) {
                          url = CDN_BASE + url;
                      }
                      return origFetch(url, opts);
                  };
              }

              // Patch Audio src for RPG Maker sound loading
              var origAudioDesc = Object.getOwnPropertyDescriptor(HTMLAudioElement.prototype, 'src')
                  || Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, 'src');
              if (origAudioDesc && origAudioDesc.set) {
                  Object.defineProperty(HTMLAudioElement.prototype, 'src', {
                      set: function(value) {
                          if (typeof value === 'string' && RELATIVE.test(value)) {
                              value = CDN_BASE + value;
                          }
                          origAudioDesc.set.call(this, value);
                      },
                      get: origAudioDesc.get,
                      configurable: true
                  });
              }
          })();
          </script>
      </head>
      <body style="background-color: black">
