<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, minimal-ui, shrink-to-fit=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Blocky Puzzle</title>
    <style>
      body { position: fixed; margin: 0; padding: 0; background-color: #52aaec; }
      .canvas-app-container { width: 100%; height: 100%; position: absolute; align-items: center; justify-content: center; overflow: hidden; background: #52aaec; }
      #canvas { outline: none; border: 0; width: 100%; vertical-align: bottom; }
      #canvas-container { position: relative; }
      canvas:focus, canvas:active { outline: none; border: 0; }
      div { -webkit-tap-highlight-color: rgba(0,0,0,0); -webkit-touch-callout: none; user-select: none; }
      .loading-screen-container { position: absolute; top: 0; left: 0; height: 100%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .message { height: 30px; display: flex; align-items: center; font-family: Verdana, Helvetica, sans-serif; }
      .logo { width: 100%; max-width: 256px; height: auto; }
      .loading-bar { margin-top: 0; width: 180px; display: flex; background: rgba(255,255,255,0.1); }
      .main-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; flex-direction: column; }
      .block { background: linear-gradient(#00df00,#00b400); border-top: 5px solid #00f98b; border-bottom: 5px solid #007d00; border-left: 5px solid #00da00; border-right: 5px solid #009b00; width: 20px; min-width: 20px; height: 20px; min-height: 20px; box-shadow: 1px 2px 36px #ffffff7a; opacity: 0; animation: fadeInOut 3s linear 0s infinite; }
      .block:nth-child(2){animation:fadeInOut1 3s linear 0s infinite}
      .block:nth-child(3){animation:fadeInOut2 3s linear 0s infinite}
      .block:nth-child(4){animation:fadeInOut3 3s linear 0s infinite}
      .block:nth-child(5){animation:fadeInOut4 3s linear 0s infinite}
      .block:nth-child(6){animation:fadeInOut5 3s linear 0s infinite}
      @keyframes fadeInOut{0%,15%{opacity:0;transform:scale(.5)}20%,100%{opacity:1;transform:scale(1)}}
      @keyframes fadeInOut1{0%,30%{opacity:0;transform:scale(.5)}35%,100%{opacity:1;transform:scale(1)}}
      @keyframes fadeInOut2{0%,45%{opacity:0;transform:scale(.5)}50%,100%{opacity:1;transform:scale(1)}}
      @keyframes fadeInOut3{0%,60%{opacity:0;transform:scale(.5)}66%,100%{opacity:1;transform:scale(1)}}
      @keyframes fadeInOut4{0%,75%{opacity:0;transform:scale(.5)}81%,100%{opacity:1;transform:scale(1)}}
      @keyframes fadeInOut5{0%,90%{opacity:0;transform:scale(.5)}96%,100%{opacity:1;transform:scale(1)}}
      #back-btn {
        position: fixed; top: 12px; left: 12px; z-index: 9999;
        background: rgba(0,0,0,0.75); color: #fbbf24;
        border: 1px solid #fbbf2455; padding: 8px 16px;
        border-radius: 8px; font-size: 13px; cursor: pointer;
        text-decoration: none; font-family: 'Segoe UI', sans-serif;
        transition: background 0.2s;
      }
      #back-btn:hover { background: #b45309; color: #fff; }
    </style>
  </head>
  <body>
    <a href="../index.html" id="back-btn">← Block 一覧</a>
    <div id="app-container" class="canvas-app-container">
      <div id="canvas-container" class="canvas-app-canvas-container">
        <canvas id="canvas" class="canvas-app-canvas" tabindex="1" width="590" height="960"></canvas>
      </div>
      <div class="buttons-background"></div>
    </div>
    <script id="engine-loader" type="text/javascript" src="dmloader.js"></script>
    <script id="custom-progress-bar" type="text/javascript">
      var originalAddProgress = Progress.addProgress;
      Progress.addProgress = function(canvas) {
        canvas.insertAdjacentHTML("afterend", `
<div class="loading-screen-container" id="loading-screen-container">
  <div class="main-container">
    <img src="game_logo.png" class="logo">
    <div class="message" id="percentage" style="margin-top:6px;">0%</div>
    <div class="loading-bar">
      <div class="block"></div><div class="block"></div><div class="block"></div>
      <div class="block"></div><div class="block"></div><div class="block"></div>
    </div>
    <div class="message" id="message"></div>
  </div>
</div>`);
        Progress.progress = document.getElementById("loading-screen-container");
        Progress.addListener(function(pct) {
          var el = document.getElementById("percentage");
          if (el) el.innerHTML = Math.min(Math.ceil(pct), 100) + "%";
        });
        var phrases = ["Polishing blocks...","Preparing gems...","Loading effects...","Loading game..."];
        var idx = 0;
        function changeText() {
          var el = document.getElementById("message");
          if (el) el.innerHTML = phrases[idx];
          idx++;
          if (idx < phrases.length) setTimeout(changeText, 2000);
        }
        changeText();
      };
    </script>
    <script id="engine-setup" type="text/javascript">
      var extra_params = {
        archive_location_filter: function(path) { return "archive" + path; },
        engine_arguments: ["--verify-graphics-calls=false"],
        custom_heap_size: 67108864,
        full_screen_container: "#canvas-container",
        disable_context_menu: true
      };
      Module["INITIAL_MEMORY"] = extra_params.custom_heap_size;
      Module["onRuntimeInitialized"] = function() { Module.runApp("canvas", extra_params); };
      Module["locateFile"] = function(path, scriptDirectory) {
        if (path == "dmengine.wasm" || path == "dmengine_release.wasm" || path == "dmengine_headless.wasm") {
          path = "blockypuzzle.wasm";
        }
        return scriptDirectory + path;
      };
      var prevW = -1, prevH = -1;
      function resize_game_canvas() {
        var container = document.getElementById("app-container");
        var gameCanvas = document.getElementById("canvas");
        var w = window.innerWidth, h = window.innerHeight;
        if (prevW === w && prevH === h) return;
        prevW = w; prevH = h;
        container.style.width = w + "px";
        container.style.height = h + "px";
        gameCanvas.width = w;
        gameCanvas.height = h;
      }
      resize_game_canvas();
      window.addEventListener("resize", resize_game_canvas, false);
      window.addEventListener("orientationchange", resize_game_canvas, false);
    </script>
    <script id="engine-start" type="text/javascript">
      if (!window.location.href.startsWith("file://")) {
        EngineLoader.stream_wasm = true;
        EngineLoader.load("canvas", "blockypuzzle");
      }
    </script>
  </body>
</html>
